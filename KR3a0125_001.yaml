body:
  text: 夏侯子新論抵疑當路子有疑夏侯湛者而謂之曰吾聞有其才而不遇者時也有其時而不遇者命也吾子童幼而岐嶷弱冠而著德少而流聲長而垂名拔萃始立而登宰相之朝揮翼初儀而受卿尹之舉蕩典籍之華談先王之言入閶闔躡丹墀染彤管吐洪輝干當世之務觸人主之威有效矣而官不過散郎舉不過賢良鳳棲五朞龍蟠六年英耀禿落羽儀摧殘而獨雍容藝文蕩駘儒林志不輟著述之業口不釋雅頌之音徒費情而耗力勞神而苦心此術亦以薄矣而終莫之辨宜吾子之陸沉也且以言乎才則吾子優矣以言乎時則子之所與二三公者義則骨肉之固交則明道之觀也富於德貴於官其所發明雖叩牛操築之客傭賃抱關之隸負俗懷譏之士猶將登為大夫顯為卿尹於何有寶咳唾之音愛錙銖之力向若垂一鱗回一翼令吾子攀其飛騰之勢掛其羽翼之木猶奮迅於雲霄之際騰驤於四極之外今乃金口玉音漠然沉默使吾子棲遲窮巷守此困極心有窮志貌有饑色吝江河之流不以濯舟船之畔惜東壁之光不以寓貧婦之目抑非二三公之蔽賢也實吾子之拙惑也夏侯子曰噫湛也幸有過人必知之矣吾子所以褒飾之太矣斟酌之喻非小醜之所堪也然過承古人之誨抑因子大夫之忝在弊室也敢布其腹心豈能隱几以覽其概乎客曰敢祗以聽夏侯子曰吾聞先大夫孔聖之言德之不修學之不講聞義不能徙不善不能改是吾憂也四德具而名位不至者非吾任也是以君子求諸己小人求諸人僕也承門戶之業受過庭之訓是以得接冠帶之末充乎士大夫之列頗窺六經之文覽百家之學弱年而入公朝蒙蔽而當顯舉進不能拔群出萃卻不能抗排當世志則乍顯乍昧文則乍幽乍蔚知之者則謂之欲逍遙以養生不知之者則謂之欲遑遑以求達此皆未是僕之所匱也僕又聞世有道則士無所執其節黜陟明則下不在量其力是以當舉而不辭入朝而酬問僕東野之鄙人頑直之陋生也不識當世之便不達朝廷之情不能倚靡容悅出入崎傾逐巧點妍嘔喁辨佞隨群班之次伏簡墨之後當此之時若失水之魚喪家之狗行不勝衣言不出口安能于當世之務觸人主之威適足以露狂簡而增塵垢縱使心有至言言有偏直此委巷之誠非朝廷之欲也今天子以茂德臨天下以八方六合為四境海內無虞萬國玄靜九夷之從王化猶洪聲之收清響黎苗之樂函夏若遊形之招惠景鄉曲之徒一介之士曾諷急就習甲子者皆奮筆揚文議制論道出草苗起林藪御青鎖入金墉者無日不有充三臺之寺盈中書之閣有司不能竟其文當年不能編其籍此執政之所厭聞也若乃群公百辟卿士常伯被朱佩紫耀金帶白坐而論道者又充路盈寢黃幄玉階之內飽其尺牘矣若僕之言皆糞土之說消磨灰爛垢辱招穢適可充衛士之爨盈掃除之器譬投盈寸之膠而欲使江海易色燒一羽之毛而欲令大爐增勢若燎原之煙彌天之雲噓之不益其熱吸之不減其氣今子見僕入朝暫對便欲坐望高位吐言數百謂陵嶒一世何吾子之失評也僕固脂車以須放秣馬以待卻反耕於枳落歸志乎渦瀨從容乎農夫優游乎卒歲矣古者天子畫土以封群后群后受國以臨其邦懸大賞以樂其成列九伐以討其違興衰相形安危相頎故在位者以求賢為務受任者以進才為急今也則九州為一家萬國為百郡政有常道法有恆訓因循而禮樂自定揖讓而天下大順夫道學之貴游閭邑之搢紳皆高門之子世臣之胤宏風長譽推成而進悠悠者皆天下之彥也諷詁訓傳詩書講儒墨說玄虛僕皆不如也二三公之簡僕於凡庸之肆顯僕於細猥之中則為功也重矣時而清談則為親也周矣且古之君子不知士則不明不安是以居逸而思危對食而肴乾今也則否居位者以善身為靜以寡交為慎以弱斷為重以怯言為信不知士者無公誹不得士者不私愧彼在位者皆稷契咎益伊呂周召之倫叔豹仲熊之儔稽古則踰黃唐經緯則越虞夏蔑昆吾之功嗤桓文之勳抵㧙管仲蹉雹晏嬰其遠則欲升鼎湖近則欲超太平不重嗇神獨善共身玄白沖虛仡爾養真雖力狹太山將不舉一羽揚波萬里將不濯一鱗咳唾成珠玉揮袂出風雲豈肯蹩躠鄙事取才進人此又吾子之失言也子獨不聞夫神人乎吸風飲露不食五穀登太清遊山嶽靡芝草弄白玉不因而獨備無假而自足不與人路同嗜欲不與世務齊榮辱故能入無窮之門享不死之年以此言之何待進賢客曰聖人有言曰邦有道貧且賤焉恥也今子值有道之世當太平之會不攘袂奮氣發謀出奇使鳴鶴受和好爵見縻抑乃沉身郎署約志勤卑不亦羸哉且伊尹之干成湯寧戚之忤桓公或投已鼎俎或庸身飯牛明廢興之機歌白水之流德入殷王義感齊侯故伊尹起庖廚而登阿衡寧戚出車下而階大夫外無微介內無請謁矯身擢手徑躡名位吾子亦何不慕賢以自厲希古以慷慨乎夏侯子曰嗚呼是何言歟富與貴是人之所欲非僕之所惡也夫干將之劍陸斷狗馬水截蛟龍而鉛刀不能入泥騏驥驊騮之乘一日而致千里而駑蹇不能邁畝百鍊之鑑別鬚眉之數而壁土不見泰山鴻鵠一舉橫四海之區出青雲之外而尺鷃不陵桑榆此利鈍之覺優劣之決也夫欲進其身者不過千萬乘而僕以上朝堂答世問不過顯所知僕以竭心思盡才學意無雅正可準論無片言可採是以頓於鄙劣而莫之能起也以此言之僕何為其不自衒哉子不嫌僕德之不劭而疑其位之不到是猶反鏡而索照登木而下釣僕未以此為不肖也若乃伊尹負鼎以干湯呂尚隱遊以徼文傅說操築以寤主寧戚擊角以要君此非僕所能也莊周駘蕩以放言君平賣卜以自賢接輿陽狂以蔽身梅福棄家以求仙此又非僕之所安也若乃季札抗節於延陵揚雄覃思於太玄伯玉和柔於人懷柳惠三黜於士官僕雖不敏竊頗倣佛其清塵晉書本傳雜篇佚文紂亂太熟爛矣武王乃往伐之太平御覽卷八十二爪生於肉去爪而肉不知太平御覽卷三百七十引夏侯子髮生於皮去髮而皮不知太平御覽卷三百七十五引新論一舟之覆無一毫不溼一馬之走無一毛不動故大同萬物不一也太平御覽卷八百九十七魯人有善相馬者與余俱遊夜方寐聞馬有行者魯人驚曰七百里也吾恐此暗中耳同上一蟻之行一蚊之飛聖人皆知之太平御覽卷九百四十五
